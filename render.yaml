# Render Blueprint — Barakfi Infrastructure
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: barakfi-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    region: singapore
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: MARKET_DATA_PROVIDER
        value: auto_global
      - key: APP_ENV
        value: production

  # Single daily job: prices + news + screening (POST /api/internal/daily-refresh)
  # Schedule is UTC. Adjust to taste (e.g. after India close).
  - type: cron
    name: barakfi-daily-update
    runtime: python
    buildCommand: pip install httpx
    startCommand: python scripts/daily_update.py --full-pipeline
    schedule: "30 4 * * *"
    region: singapore
    branch: main
    plan: free
    envVars:
      # fromService hostport is like ``svc:10000``; daily_update.py normalizes to http://.../api
      - key: API_BASE_URL
        fromService:
          name: barakfi-api
          type: web
          property: hostport
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
