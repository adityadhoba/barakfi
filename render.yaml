# Render Blueprint — Barakfi Infrastructure
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: barakfi-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    region: singapore
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: MARKET_DATA_PROVIDER
        value: auto_global
      - key: APP_ENV
        value: production

  # Job A: fundamentals refresh (weekday)
  # 04:30 PM IST Mon–Fri => 11:00 UTC
  - type: cron
    name: barakfi-daily-fundamentals
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 fetch_real_data.py
    schedule: "0 11 * * 1-5"
    region: singapore
    branch: main
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false

  # Job B: run internal daily refresh pipeline after fundamentals update
  # 05:45 PM IST Mon–Fri => 12:15 UTC
  - type: cron
    name: barakfi-daily-refresh
    runtime: python
    buildCommand: pip install httpx
    startCommand: PYTHONPATH=. python3 scripts/run_daily_refresh.py
    schedule: "15 12 * * 1-5"
    region: singapore
    branch: main
    plan: free
    envVars:
      - key: API_BASE_URL
        fromService:
          name: barakfi-api
          type: web
          property: hostport
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
