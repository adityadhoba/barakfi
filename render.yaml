# Render Blueprint — Barakfi Infrastructure
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: barakfi-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    region: singapore
    plan: starter
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MARKET_DATA_PROVIDER
        value: auto_global
      - key: APP_ENV
        value: production
      - key: OPS_SLACK_WEBHOOK_URL
        sync: false
      - key: OPS_ALERT_FAILURES_ENABLED
        value: "true"
      - key: OPS_ALERT_SUCCESSES_ENABLED
        value: "true"
      - key: OPS_ALERT_JOB_A_SUCCESSES_ENABLED
        value: "false"
      - key: OPS_ALERT_QUIET_WINDOW_ENABLED
        value: "false"
      - key: OPS_ALERT_QUIET_WINDOW_SECONDS
        value: "1800"

  # Job A: fundamentals refresh (weekday)
  # 04:30 PM IST Mon–Fri => 11:00 UTC
  - type: cron
    name: barakfi-daily-fundamentals
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 fetch_real_data.py
    schedule: "0 11 * * 1-5"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      # Yahoo/yfinance throttling controls for Job A.
      - key: YF_RATE_LIMIT_SECONDS
        value: "1.5"
      - key: YF_MAX_RETRIES
        value: "5"
      - key: YF_RETRY_BASE_SECONDS
        value: "15"
      - key: YF_RETRY_MAX_SECONDS
        value: "180"
      - key: YF_COOLDOWN_TRIGGER_CONSECUTIVE
        value: "5"
      - key: YF_COOLDOWN_SECONDS
        value: "180"
      # Job A sends Slack alerts directly from fetch_real_data.py,
      # so it needs the webhook in *this* cron job environment too.
      - key: OPS_SLACK_WEBHOOK_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: OPS_ALERT_FAILURES_ENABLED
        value: "true"
      - key: OPS_ALERT_SUCCESSES_ENABLED
        value: "true"
      # Send success alerts from Job A too (so we can verify healthy runs).
      - key: OPS_ALERT_JOB_A_SUCCESSES_ENABLED
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"

  # Job B: run internal daily refresh pipeline after fundamentals update
  # 05:45 PM IST Mon–Fri => 12:15 UTC
  - type: cron
    name: barakfi-daily-refresh
    runtime: python
    buildCommand: pip install httpx
    startCommand: PYTHONPATH=. python3 scripts/run_daily_refresh.py
    schedule: "15 12 * * 1-5"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: API_BASE_URL
        fromService:
          name: barakfi-api
          type: web
          property: hostport
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      # Job B sends Slack alerts directly from scripts/run_daily_refresh.py
      - key: OPS_SLACK_WEBHOOK_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: OPS_ALERT_FAILURES_ENABLED
        value: "true"
      - key: OPS_ALERT_SUCCESSES_ENABLED
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"

  # ============================================================================
  # V2 Pipeline Jobs — Official-Source Architecture
  # ============================================================================

  # Job C: Universe sync — Nifty 500 constituent list + NSE securities master
  # 08:30 IST Mon–Fri => 03:00 UTC  (before market open)
  # NOTE: This job uses only official NSE public downloads. No paid API required.
  # When a paid data provider is purchased, add it as secondary enrichment here.
  - type: cron
    name: barakfi-universe-sync
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 scripts/pipeline/universe_sync.py
    schedule: "0 3 * * 1-5"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPS_SLACK_WEBHOOK_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: OPS_ALERT_FAILURES_ENABLED
        value: "true"
      - key: OPS_ALERT_SUCCESSES_ENABLED
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"

  # Job D-pre: Fundamentals sync — NSE Financial Results API (official Reg 33 source)
  # 05:00 PM IST Mon–Fri => 11:30 UTC  (after market close, before screening recompute)
  # Primary: NSE financial results JSON API (quarterly/annual XBRL-backed filings)
  # Fallback: yfinance (internal research only, not published as truth)
  # Writes: DataFinancialFact → FundamentalsSnapshot → Stock (legacy API write-back)
  - type: cron
    name: barakfi-fundamentals-sync
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 scripts/pipeline/fundamentals_sync.py --period Annual
    schedule: "30 11 * * 1-5"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPS_SLACK_WEBHOOK_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: OPS_ALERT_FAILURES_ENABLED
        value: "true"
      - key: OPS_ALERT_SUCCESSES_ENABLED
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"

  # Job D: EOD price sync — NSE bhavcopy (official end-of-day prices)
  # 06:30 PM IST Mon–Fri => 13:00 UTC  (after market close + bhavcopy publish lag)
  # Source: NSE bhavcopy archive (official) — no paid API required.
  - type: cron
    name: barakfi-eod-price-sync
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 scripts/pipeline/eod_price_sync.py
    schedule: "0 13 * * 1-5"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPS_SLACK_WEBHOOK_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: OPS_ALERT_FAILURES_ENABLED
        value: "true"
      - key: OPS_ALERT_SUCCESSES_ENABLED
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"

  # Job E: Screening recompute — runs after EOD prices are available
  # 07:30 PM IST Mon–Fri => 14:00 UTC
  # Reads from official-source truth tables; no external API calls.
  - type: cron
    name: barakfi-screening-recompute
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 scripts/pipeline/screening_recompute.py
    schedule: "0 14 * * 1-5"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPS_SLACK_WEBHOOK_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: OPS_ALERT_FAILURES_ENABLED
        value: "true"
      - key: OPS_ALERT_SUCCESSES_ENABLED
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"

  # ============================================================================
  # Data Warehouse Pipeline (ISIN-first, additive)
  # ============================================================================

  # Official NSE/BSE universe → data_warehouse tables (daily, overnight)
  - type: cron
    name: barakfi-sync-universe
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 scripts/sync_universe.py
    schedule: "0 1 * * *"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: APP_ENV
        value: production

  # NSE bhavcopy EOD prices → data_warehouse (weekdays, later slot to avoid collision)
  - type: cron
    name: barakfi-sync-eod-prices
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 scripts/sync_eod_prices.py
    schedule: "30 12 * * 1-5"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: APP_ENV
        value: production

  # NSE corporate announcements / filings catalog (daily)
  - type: cron
    name: barakfi-sync-filings-catalog
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 scripts/sync_filings.py
    schedule: "30 14 * * *"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: APP_ENV
        value: production

  # NSE corporate actions poll (weekdays)
  - type: cron
    name: barakfi-sync-corp-actions
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python3 scripts/sync_corporate_actions.py
    schedule: "30 2,12 * * 1-5"
    region: singapore
    branch: main
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: APP_ENV
        value: production
